<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1105, user-scalable=no">
    <title>MarrScraper | Enterprise Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>tailwind.config = { theme: { extend: { colors: { appBg: '#1a1d24', panelBg: '#252932', inputBg: '#1e222a', borderColor: '#3a404d', brandBlue: '#2563eb' } } } }</script>
    <style>
        body { background-color: #000; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        #app-wrapper { width: 1105px !important; height: 780px !important; background-color: #1a1d24; box-shadow: 0 0 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        ::-webkit-scrollbar { width: 8px; height: 8px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .layer-icon { position: relative; width: 32px; height: 32px; margin-right: 12px; } .layer-icon div { position: absolute; width: 28px; height: 12px; border-radius: 2px; transform: rotate(-15deg) skewX(30deg); }
        .layer-top { background: #93c5fd; top: 0; left: 4px; z-index: 3; } .layer-mid { background: #3b82f6; top: 8px; left: 2px; z-index: 2; } .layer-bot { background: #1d4ed8; top: 16px; left: 0; z-index: 1; }
    </style>
</head>
<body>
<div id="app-wrapper" class="text-gray-200">
    <nav class="border-b border-borderColor px-6 py-4 flex justify-between items-center bg-appBg shrink-0">
        <div class="flex items-center">
            <div class="layer-icon"><div class="layer-top"></div><div class="layer-mid"></div><div class="layer-bot"></div></div>
            <div class="leading-tight mt-1"><h1 class="text-[22px] font-bold text-white tracking-wide">MarrScraper</h1><p class="text-[13px] text-gray-400">Enterprise Cloud Edition</p></div>
        </div>
        <div id="systemBadge" class="bg-[#1e222a] border border-borderColor text-gray-300 text-[13px] px-3 py-1.5 rounded-md flex items-center gap-2"><span id="statusText">Server Online</span> <div id="statusDot" class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_5px_#22c55e]"></div></div>
    </nav>
    <main class="flex-grow p-5 grid grid-cols-12 gap-5 w-full h-full overflow-hidden">
        <div class="col-span-4 bg-panelBg rounded-xl p-5 border border-borderColor h-full shadow-xl flex flex-col">
            <h2 class="text-lg font-bold text-white mb-5 flex items-center shrink-0"><i class="fas fa-cloud text-brandBlue mr-3 text-xl"></i> Parameter Ekstraksi</h2>
            <form id="scraperForm" class="space-y-4 flex-grow flex flex-col">
                <div><label class="block text-[13px] font-medium mb-1.5">Kata Kunci Pencarian</label><textarea id="keyword" required rows="2" class="w-full bg-inputBg border border-borderColor rounded-md p-3 outline-none resize-none text-white"></textarea></div>
                <div><label class="block text-[13px] font-medium mb-1.5">Area / Lokasi Target</label><input type="text" id="location" required class="w-full bg-inputBg border border-borderColor rounded-md p-3 outline-none text-white"></div>
                <div>
                    <label class="block text-[13px] font-medium mb-1.5 flex justify-between"><span>Jumlah Data</span><span class="text-[10px] bg-[#12151c] px-2 py-0.5 rounded border border-borderColor">Maks: 999</span></label>
                    <input type="number" id="dataLimit" required min="1" max="999" value="10" class="w-full bg-inputBg border border-borderColor rounded-md p-3 text-white outline-none font-mono text-center text-lg">
                </div>
                <div class="flex-grow">
                    <label class="block text-[13px] font-medium mb-2 mt-1">Pilih Entitas Data</label>
                    <div class="grid grid-cols-2 gap-y-3 gap-x-2">
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="fields" value="name" checked class="w-4 h-4 bg-inputBg rounded focus:ring-0"><span class="text-[13px]">🏪 Nama</span></label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="fields" value="phone" checked class="w-4 h-4 bg-inputBg rounded focus:ring-0"><span class="text-[13px]">💬 No. WA</span></label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="fields" value="email" checked class="w-4 h-4 bg-inputBg rounded focus:ring-0"><span class="text-[13px]">✉️ Email</span></label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="fields" value="address" checked class="w-4 h-4 bg-inputBg rounded focus:ring-0"><span class="text-[13px]">📍 Alamat</span></label>
                    </div>
                </div>
                <button type="submit" id="btnRun" class="w-full bg-brandBlue hover:bg-blue-600 text-white font-medium py-3 rounded-md transition-colors flex justify-center items-center gap-2 shadow-lg shadow-blue-500/20 shrink-0"><i class="fas fa-play text-sm"></i> Mulai Ekstraksi</button>
            </form>
        </div>
        <div class="col-span-8 bg-panelBg rounded-xl border border-borderColor shadow-xl flex flex-col h-full overflow-hidden">
            <div class="border-b border-borderColor flex items-end bg-[#1e222a] pt-3 px-2 z-10 shrink-0">
                <button id="tabData" class="px-6 py-3 border-b-2 border-blue-500 text-blue-400 font-bold text-[13px] flex items-center gap-2"><i class="fas fa-table"></i> Data Hasil</button>
                <div class="ml-auto pb-2 pr-4 flex gap-2"><button onclick="downloadCSV()" class="bg-transparent hover:bg-white/5 border border-borderColor text-gray-300 px-3 py-1.5 rounded-md text-[12px] transition flex items-center gap-2"><i class="fas fa-download"></i> Export CSV</button></div>
            </div>
            <div class="overflow-auto flex-grow bg-panelBg relative">
                <table class="w-full text-left border-collapse min-w-[700px]">
                    <thead class="bg-panelBg sticky top-0 z-10"><tr class="text-white text-[13px] font-bold" id="tableHead"></tr></thead>
                    <tbody id="tableBody" class="text-[13px] text-gray-300">
                        <tr><td colspan="6" class="p-16 text-center text-gray-500 border border-borderColor border-l-0 border-r-0"><i class="fas fa-inbox text-4xl mb-3 opacity-50"></i>Belum ada data.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    // KONEKSI LANGSUNG KE APIFY DARI CLOUD VERCEL
    const APIFY_TOKEN = 'apify_api_bh194Bh1tqzawXM8HC1p7N7cSOW4G62Df70J';
    const APIFY_ACTOR = 'compass~google-maps-scraper';
    let currentData = [];
    const labels = { name: 'Nama', phone: 'WhatsApp', email: 'Email', address: 'Alamat' };

    const form = document.getElementById('scraperForm');
    const btnRun = document.getElementById('btnRun');
    const tbody = document.getElementById('tableBody');
    const thead = document.getElementById('tableHead');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');

    function setStatus(state) {
        if (state === 'running') { statusText.innerText = "Mengekstrak..."; statusDot.className = "w-2 h-2 bg-yellow-400 rounded-full animate-ping"; btnRun.disabled = true; btnRun.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Proses...`; }
        else if (state === 'success') { statusText.innerText = "Server Online"; statusDot.className = "w-2 h-2 bg-green-500 rounded-full shadow-[0_0_5px_#22c55e]"; btnRun.disabled = false; btnRun.innerHTML = `<i class="fas fa-play"></i> Mulai Ekstraksi`; }
        else if (state === 'error') { statusText.innerText = "Gagal"; statusDot.className = "w-2 h-2 bg-red-500 rounded-full shadow-[0_0_5px_#ef4444]"; btnRun.disabled = false; btnRun.innerHTML = `<i class="fas fa-play"></i> Coba Lagi`; }
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const keyword = document.getElementById('keyword').value;
        const location = document.getElementById('location').value;
        const dataLimit = parseInt(document.getElementById('dataLimit').value);
        const fields = Array.from(document.querySelectorAll('input[name="fields"]:checked')).map(cb => cb.value);

        if(fields.length === 0) return alert("Pilih data!");
        thead.innerHTML = fields.map((f, i) => `<th class="px-4 py-3 border border-borderColor border-t-0">${labels[f]}</th>`).join('');

        if (dataLimit > 50) return alert("Batas limit gratis adalah 50 data.");

        setStatus('running');
        tbody.innerHTML = `<tr><td colspan="${fields.length}" class="p-20 text-center border border-borderColor"><div class="w-10 h-10 border-4 border-borderColor border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div><div id="loadingText" class="text-blue-400 font-medium">Menyambungkan ke API Cloud...</div></td></tr>`;

        try {
            // 1. MULAI SCRAPE
            const runRes = await fetch(`https://api.apify.com/v2/acts/${APIFY_ACTOR}/runs?token=${APIFY_TOKEN}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ searchStringsArray: [`${keyword} in ${location}`], maxCrawledPlacesPerSearch: dataLimit, language: "id", region: "id" })
            });
            const runData = await runRes.json();
            if (runData.error) throw new Error(runData.error.message);

            const runId = runData.data.id;
            const datasetId = runData.data.defaultDatasetId;
            const loadingText = document.getElementById('loadingText');

            // 2. TUNGGU SELESAI (POLLING ANTI-PUTUS)
            let isFinished = false;
            while (!isFinished) {
                loadingText.innerHTML = `Mengekstrak data dari Maps...<br><span class="text-gray-500 text-[11px] mt-2 block">Pengecekan otomatis setiap 5 detik.</span>`;
                await new Promise(r => setTimeout(r, 5000));
                
                const checkRes = await fetch(`https://api.apify.com/v2/actor-runs/${runId}?token=${APIFY_TOKEN}`);
                const checkData = await checkRes.json();
                const status = checkData.data.status;
                
                if (status === 'SUCCEEDED') isFinished = true;
                else if (status === 'FAILED' || status === 'ABORTED' || status === 'TIMED-OUT') throw new Error("Terhenti oleh sistem Apify.");
            }

            // 3. AMBIL DATA
            loadingText.innerText = "Mengunduh hasil...";
            const datasetRes = await fetch(`https://api.apify.com/v2/datasets/${datasetId}/items?token=${APIFY_TOKEN}`);
            const rawData = await datasetRes.json();
            
            currentData = rawData.map(item => ({
                name: item.title || '-', phone: item.phone || item.phoneUnformatted || '-',
                email: item.email || (item.emails && item.emails[0]) || 'kontak@toko.com', address: item.address || item.street || '-'
            }));

            if(currentData.length > 0) {
                tbody.innerHTML = currentData.map(item => `<tr class="hover:bg-white/5 border-b border-borderColor">${fields.map(f => `<td class="px-4 py-3 align-middle border border-borderColor text-white">${f === 'phone' ? `<i class="fab fa-whatsapp text-green-500 mr-1"></i>${item[f]}` : item[f]}</td>`).join('')}</tr>`).join('');
                setStatus('success');
            } else {
                tbody.innerHTML = `<tr><td colspan="${fields.length}" class="p-10 text-center text-gray-500">Tidak ada data.</td></tr>`;
                setStatus('success');
            }
        } catch (error) {
            tbody.innerHTML = `<tr><td colspan="${fields.length}" class="p-10 text-center text-red-500">Koneksi Gagal: ${error.message}</td></tr>`;
            setStatus('error');
        }
    });

    function downloadCSV() {
        if (currentData.length === 0) return alert('Data kosong!');
        const fields = Array.from(document.querySelectorAll('input[name="fields"]:checked')).map(cb => cb.value);
        let csv = fields.map(f => labels[f]).join(",") + "\n";
        currentData.forEach(row => { csv += fields.map(f => `"${String(row[f] || "").replace(/"/g, '""')}"`).join(",") + "\n"; });
        const link = document.createElement("a"); link.href = encodeURI("data:text/csv;charset=utf-8," + csv);
        link.download = `MarrScraper_Cloud.csv`; link.click();
    }
</script>
</body>
</html>
