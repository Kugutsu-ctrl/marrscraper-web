<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1105, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MarrScraper | Enterprise Cloud (Engine v3.0)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>tailwind.config = { theme: { extend: { colors: { appBg: '#1a1d24', panelBg: '#252932', inputBg: '#1e222a', borderColor: '#3a404d', brandBlue: '#2563eb', terminal: '#0c0c0c', termText: '#00ff00' } } } }</script>
    <style>
        body { background-color: #000; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; touch-action: none; overflow: hidden; }
        #app-wrapper { width: 1105px !important; height: 780px !important; background-color: #1a1d24; box-shadow: 0 0 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .terminal-container { background-color: #0c0c0c; border: 1px solid #333; padding: 15px; font-family: 'Courier New', Courier, monospace; height: 100%; overflow-y: auto; text-shadow: 0 0 5px rgba(0,255,0,0.5); }
        .blinking-cursor { display: inline-block; width: 8px; height: 15px; background-color: #00ff00; animation: blink 1s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
<div id="app-wrapper" class="text-gray-200">
    <nav class="border-b border-borderColor px-6 py-4 flex justify-between items-center bg-appBg shrink-0">
        <div class="flex items-center">
            <div style="position: relative; width: 32px; height: 32px; margin-right: 12px;">
                <div style="position: absolute; width: 28px; height: 12px; background: #93c5fd; border-radius: 2px; transform: rotate(-15deg) skewX(30deg); top: 0; left: 4px; z-index: 3;"></div>
                <div style="position: absolute; width: 28px; height: 12px; background: #3b82f6; border-radius: 2px; transform: rotate(-15deg) skewX(30deg); top: 8px; left: 2px; z-index: 2;"></div>
                <div style="position: absolute; width: 28px; height: 12px; background: #1d4ed8; border-radius: 2px; transform: rotate(-15deg) skewX(30deg); top: 16px; left: 0; z-index: 1;"></div>
            </div>
            <div class="leading-tight mt-1"><h1 class="text-[22px] font-bold text-white tracking-wide">MarrScraper</h1><p class="text-[13px] text-gray-400">Enterprise Cloud - OpenPro Engine</p></div>
        </div>
        <div id="systemBadge" class="bg-[#1e222a] border border-borderColor text-gray-300 text-[13px] px-3 py-1.5 rounded-md flex items-center gap-2"><span id="statusText">System Ready</span> <div id="statusDot" class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_5px_#22c55e]"></div></div>
    </nav>

    <main class="flex-grow p-5 grid grid-cols-12 gap-5 w-full h-full overflow-hidden">
        <div class="col-span-4 bg-panelBg rounded-xl p-5 border border-borderColor h-full shadow-xl flex flex-col">
            <h2 class="text-lg font-bold text-white mb-5 flex items-center shrink-0"><i class="fas fa-microchip text-blue-400 mr-3 text-xl"></i> Konsol OpenPro</h2>
            <form id="scraperForm" class="space-y-4 flex-grow flex flex-col">
                <div>
                    <label class="block text-[13px] font-medium mb-1.5 flex justify-between"><span>Kata Kunci (Maks 5)</span><span class="text-xs text-gray-400">Bisa Enter/Koma</span></label>
                    <textarea id="keyword" required rows="4" placeholder="Toko Baju&#10;Konter HP&#10;Butik" class="w-full bg-inputBg border border-borderColor rounded-md p-3 outline-none resize-none text-white text-sm"></textarea>
                </div>
                <div><label class="block text-[13px] font-medium mb-1.5">Lokasi</label><input type="text" id="location" required placeholder="Contoh: Bogor" class="w-full bg-inputBg border border-borderColor rounded-md p-3 outline-none text-white text-sm"></div>
                <div>
                    <label class="block text-[13px] font-medium mb-1.5 flex justify-between"><span>Jumlah Data</span><span class="text-[10px] text-green-400">1-50 Gratis</span></label>
                    <input type="number" id="dataLimit" required min="1" max="999" value="10" class="w-full bg-inputBg border border-borderColor rounded-md p-3 text-white outline-none font-mono text-center text-lg">
                </div>
                <button type="submit" id="btnRun" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-md transition-all flex justify-center items-center gap-2 shadow-lg mt-auto"><i class="fas fa-satellite-dish text-sm"></i> LAUNCH SCRAPER</button>
            </form>
        </div>

        <div class="col-span-8 bg-panelBg rounded-xl border border-borderColor shadow-xl flex flex-col h-full overflow-hidden">
            <div class="border-b border-borderColor flex items-end bg-[#1e222a] pt-3 px-2 z-10 shrink-0">
                <button class="px-6 py-3 border-b-2 border-blue-500 text-blue-400 font-bold text-[13px]"><i class="fas fa-terminal mr-2"></i> Data & Enrichment</button>
                <div class="ml-auto pb-2 pr-4"><button onclick="downloadCSV()" class="bg-transparent hover:bg-white/5 border border-borderColor text-gray-300 px-3 py-1.5 rounded-md text-[12px] flex items-center gap-2"><i class="fas fa-download"></i> Export CSV</button></div>
            </div>
            <div id="displayArea" class="overflow-auto flex-grow bg-panelBg relative">
                <table id="dataTable" class="w-full text-left text-[13px]">
                    <thead class="bg-panelBg sticky top-0 z-10"><tr class="text-white font-bold border-b border-borderColor"><th class="px-4 py-3">Bisnis</th><th class="px-4 py-3">Kontak (WA)</th><th class="px-4 py-3">Email / Sosmed</th></tr></thead>
                    <tbody id="tableBody" class="text-gray-300">
                        <tr><td colspan="3" class="p-16 text-center text-gray-500">Input data lalu tekan Launch...</td></tr>
                    </tbody>
                </table>
                <div id="linuxTerminal" class="hidden terminal-container w-full">
                    <div id="termLogs" class="text-termText text-sm leading-relaxed mb-1"></div>
                    <div class="text-termText text-sm font-bold">marr@openpro:~# <span class="blinking-cursor"></span></div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const APIFY_TOKEN = 'apify_api_bh194Bh1tqzawXM8HC1p7N7cSOW4G62Df70J';
    const APIFY_ACTOR = 'rp_openpro.ai~google-maps-scraper';
    let currentData = [];

    function addLog(text, isError = false) {
        const time = new Date().toLocaleTimeString('it-IT');
        termLogs.innerHTML += `<div class="${isError ? 'text-red-500' : 'text-green-400'}">[${time}] ${text}</div>`;
        linuxTerminal.scrollTop = linuxTerminal.scrollHeight;
    }

    document.getElementById('scraperForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const rawKeywords = document.getElementById('keyword').value;
        const location = document.getElementById('location').value;
        const dataLimit = parseInt(document.getElementById('dataLimit').value);
        
        // PERBAIKAN: Support Enter DAN Koma
        let keywords = rawKeywords.split(/[\n,]+/).map(k => k.trim()).filter(k => k);
        if (keywords.length > 5) keywords = keywords.slice(0, 5);

        if (dataLimit > 50) {
            window.location.href = `https://wa.me/6285813992005?text=Halo MarrScraper, saya mau order paket premium ${dataLimit} data untuk lokasi ${location}.`;
            return;
        }

        dataTable.classList.add('hidden');
        linuxTerminal.classList.remove('hidden');
        termLogs.innerHTML = '';
        btnRun.disabled = true;
        btnRun.innerHTML = `<i class="fas fa-spinner fa-spin"></i> RUNNING...`;

        try {
            addLog(`Initializing OpenPro Engine...`);
            addLog(`Injecting Payload: ${keywords.join(', ')}`);
            
            // FORMAT KHUSUS UNTUK MESIN OPENPRO (Screenshot 2)
            const runRes = await fetch(`https://api.apify.com/v2/acts/${APIFY_ACTOR}/runs?token=${APIFY_TOKEN}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "searchTerms": keywords,
                    "location": location,
                    "maxItems": dataLimit,
                    "extractEmails": true,
                    "extractSocialMedia": true
                })
            });
            
            const runData = await runRes.json();
            if (!runRes.ok) throw new Error(runData.error?.message || "Engine Error");
            
            const runId = runData.data.id;
            addLog(`Thread created: ${runId}`);

            let isFinished = false;
            while (!isFinished) {
                await new Promise(r => setTimeout(r, 5000));
                addLog(`Hunting contact data & enrichment...`);
                const checkRes = await fetch(`https://api.apify.com/v2/actor-runs/${runId}?token=${APIFY_TOKEN}`);
                const checkData = await checkRes.json();
                if (checkData.data.status === 'SUCCEEDED') isFinished = true;
                if (['FAILED','ABORTED'].includes(checkData.data.status)) throw new Error("Execution Failed");
            }

            addLog(`Enrichment complete. Downloading database...`);
            const res = await fetch(`https://api.apify.com/v2/datasets/${runData.data.defaultDatasetId}/items?token=${APIFY_TOKEN}`);
            currentData = await res.json();
            
            linuxTerminal.classList.add('hidden');
            dataTable.classList.remove('hidden');
            tableBody.innerHTML = currentData.map(item => `
                <tr class="border-b border-borderColor hover:bg-white/5">
                    <td class="px-4 py-3 text-white font-medium">${item.title || item.name || '-'}</td>
                    <td class="px-4 py-3 text-green-400 font-mono">${item.phone || '-'}</td>
                    <td class="px-4 py-3 text-xs">
                        <div class="text-blue-300 mb-1">${item.email || '-'}</div>
                        <div class="text-gray-500">${item.instagram || item.facebook || ''}</div>
                    </td>
                </tr>`).join('');
        } catch (error) {
            addLog(`ERROR: ${error.message}`, true);
        } finally {
            btnRun.disabled = false;
            btnRun.innerHTML = `<i class="fas fa-satellite-dish"></i> LAUNCH SCRAPER`;
        }
    });

    function downloadCSV() {
        if (currentData.length === 0) return alert('Kosong!');
        let csv = "Nama,Telepon,Email,Instagram,Alamat\n" + currentData.map(i => `"${i.title}","${i.phone}","${i.email}","${i.instagram}","${i.address}"`).join("\n");
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", "MarrScraper_Premium.csv");
        link.click();
    }
</script>
</body>
</html>
