<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1105, user-scalable=no">
    <title>MarrScraper | Cloud Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>tailwind.config = { theme: { extend: { colors: { appBg: '#1a1d24', panelBg: '#252932', inputBg: '#1e222a', borderColor: '#3a404d', brandBlue: '#2563eb' } } } }</script>
    <style>
        body { background-color: #000; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }
        #app-wrapper { width: 1105px !important; height: 780px !important; background-color: #1a1d24; box-shadow: 0 0 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .layer-icon { position: relative; width: 32px; height: 32px; margin-right: 12px; } .layer-icon div { position: absolute; width: 28px; height: 12px; border-radius: 2px; transform: rotate(-15deg) skewX(30deg); }
        .layer-top { background: #93c5fd; top: 0; left: 4px; z-index: 3; } .layer-mid { background: #3b82f6; top: 8px; left: 2px; z-index: 2; } .layer-bot { background: #1d4ed8; top: 16px; left: 0; z-index: 1; }
    </style>
</head>
<body>
<div id="app-wrapper" class="text-gray-200">
    <nav class="border-b border-borderColor px-6 py-4 flex justify-between items-center bg-appBg shrink-0">
        <div class="flex items-center">
            <div class="layer-icon"><div class="layer-top"></div><div class="layer-mid"></div><div class="layer-bot"></div></div>
            <div class="leading-tight mt-1"><h1 class="text-[22px] font-bold text-white tracking-wide">MarrScraper</h1><p class="text-[13px] text-gray-400">Enterprise Cloud Edition</p></div>
        </div>
        <div id="systemBadge" class="bg-[#1e222a] border border-borderColor text-gray-300 text-[13px] px-3 py-1.5 rounded-md flex items-center gap-2"><span id="statusText">Server Online</span> <div id="statusDot" class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_5px_#22c55e]"></div></div>
    </nav>
    <main class="flex-grow p-5 grid grid-cols-12 gap-5 w-full h-full overflow-hidden">
        <div class="col-span-4 bg-panelBg rounded-xl p-5 border border-borderColor h-full shadow-xl flex flex-col">
            <h2 class="text-lg font-bold text-white mb-5 flex items-center shrink-0"><i class="fas fa-cloud text-brandBlue mr-3 text-xl"></i> Parameter Ekstraksi</h2>
            <form id="scraperForm" class="space-y-4 flex-grow flex flex-col">
                <div><label class="block text-[13px] font-medium mb-1.5">Kata Kunci Pencarian</label><textarea id="keyword" required rows="2" class="w-full bg-inputBg border border-borderColor rounded-md p-3 outline-none resize-none text-white"></textarea></div>
                <div><label class="block text-[13px] font-medium mb-1.5">Area / Lokasi Target</label><input type="text" id="location" required class="w-full bg-inputBg border border-borderColor rounded-md p-3 outline-none text-white"></div>
                <div>
                    <label class="block text-[13px] font-medium mb-1.5 flex justify-between"><span>Jumlah Data</span><span class="text-[10px] bg-[#12151c] px-2 py-0.5 rounded border border-borderColor">Maks: 50</span></label>
                    <input type="number" id="dataLimit" required min="1" max="50" value="10" class="w-full bg-inputBg border border-borderColor rounded-md p-3 text-white outline-none font-mono text-center text-lg">
                </div>
                <button type="submit" id="btnRun" class="w-full bg-brandBlue hover:bg-blue-600 text-white font-bold py-3 rounded-md transition-all flex justify-center items-center gap-2 shadow-lg mt-auto"><i class="fas fa-play text-sm"></i> Mulai Ekstraksi</button>
            </form>
        </div>
        <div class="col-span-8 bg-panelBg rounded-xl border border-borderColor shadow-xl flex flex-col h-full overflow-hidden">
            <div class="border-b border-borderColor flex items-end bg-[#1e222a] pt-3 px-2 z-10 shrink-0">
                <button class="px-6 py-3 border-b-2 border-blue-500 text-blue-400 font-bold text-[13px]">Data Hasil</button>
                <div class="ml-auto pb-2 pr-4"><button onclick="downloadCSV()" class="bg-transparent hover:bg-white/5 border border-borderColor text-gray-300 px-3 py-1.5 rounded-md text-[12px] flex items-center gap-2"><i class="fas fa-download"></i> Export CSV</button></div>
            </div>
            <div class="overflow-auto flex-grow bg-panelBg">
                <table class="w-full text-left text-[13px]">
                    <thead class="bg-panelBg sticky top-0 z-10"><tr class="text-white font-bold border-b border-borderColor"><th class="px-4 py-3">Nama</th><th class="px-4 py-3">WhatsApp</th><th class="px-4 py-3">Email</th><th class="px-4 py-3">Alamat</th></tr></thead>
                    <tbody id="tableBody" class="text-gray-300">
                        <tr><td colspan="4" class="p-16 text-center text-gray-500 italic">Menunggu perintah...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    const APIFY_TOKEN = 'apify_api_bh194Bh1tqzawXM8HC1p7N7cSOW4G62Df70J';
    const APIFY_ACTOR = 'compass~crawler-google-places'; 
    let currentData = [];

    document.getElementById('scraperForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const keyword = document.getElementById('keyword').value;
        const location = document.getElementById('location').value;
        const dataLimit = parseInt(document.getElementById('dataLimit').value);
        const tbody = document.getElementById('tableBody');
        const btn = document.getElementById('btnRun');

        btn.disabled = true;
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Proses...`;
        tbody.innerHTML = `<tr><td colspan="4" class="p-20 text-center"><div class="w-10 h-10 border-4 border-borderColor border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div>Menghubungkan ke Mesin Compass...</td></tr>`;

        try {
            // FORMAT ASLI YANG BENAR
            const runRes = await fetch(`https://api.apify.com/v2/acts/${APIFY_ACTOR}/runs?token=${APIFY_TOKEN}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    searchStringsArray: [`${keyword} in ${location}`], 
                    maxCrawledPlacesPerSearch: dataLimit, 
                    language: "id" 
                })
            });
            const runData = await runRes.json();
            
            if (!runRes.ok) throw new Error(runData.error?.message || "Koneksi ke Apify ditolak.");
            
            const runId = runData.data.id;

            let isFinished = false;
            while (!isFinished) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-20 text-center"><div class="w-10 h-10 border-4 border-borderColor border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div>Scraping Sedang Berjalan...<br><span class="text-gray-500 text-xs mt-2 block">Jangan tutup halaman ini</span></td></tr>`;
                await new Promise(r => setTimeout(r, 5000));
                const checkRes = await fetch(`https://api.apify.com/v2/actor-runs/${runId}?token=${APIFY_TOKEN}`);
                const checkData = await checkRes.json();
                if (checkData.data.status === 'SUCCEEDED') isFinished = true;
                if (['FAILED', 'ABORTED', 'TIMED-OUT'].includes(checkData.data.status)) throw new Error("Scraper berhenti di tengah jalan.");
            }

            const res = await fetch(`https://api.apify.com/v2/datasets/${runData.data.defaultDatasetId}/items?token=${APIFY_TOKEN}`);
            currentData = await res.json();
            
            if (currentData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-10 text-center">Data tidak ditemukan.</td></tr>`;
            } else {
                tbody.innerHTML = currentData.map(item => `
                <tr class="border-b border-borderColor hover:bg-white/5">
                    <td class="px-4 py-3 text-white font-medium">${item.title || item.name || '-'}</td>
                    <td class="px-4 py-3 text-green-400 font-mono">${item.phone || item.phoneNumber || '-'}</td>
                    <td class="px-4 py-3">${item.email || '-'}</td>
                    <td class="px-4 py-3 text-gray-400 text-xs">${item.address || '-'}</td>
                </tr>`).join('');
            }
        } catch (error) {
            tbody.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-red-500 font-bold">Koneksi Gagal: ${error.message}</td></tr>`;
        } finally {
            btn.disabled = false;
            btn.innerHTML = `<i class="fas fa-play"></i> Mulai Ekstraksi`;
        }
    });

    function downloadCSV() {
        if (currentData.length === 0) return alert('Data kosong!');
        let csv = "Nama,WhatsApp,Email,Alamat\n" + currentData.map(i => `"${i.title || i.name}","${i.phone || i.phoneNumber}","${i.email}","${i.address}"`).join("\n");
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", "MarrScraper_Data.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
