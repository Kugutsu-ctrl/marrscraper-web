<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarrScraper | Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { appBg: '#1a1d24', panelBg: '#252932', inputBg: '#1e222a', borderColor: '#3a404d', brandBlue: '#2563eb' } }
            }
        }
    </script>
    <style>
        /* Memaksa ukuran layar 1105x780 */
        body { 
            background-color: #000; /* Warna luar hitam */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }
        #app-wrapper {
            width: 1105px;
            height: 780px;
            background-color: #1a1d24;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Mencegah elemen keluar batas */
            position: relative;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .layer-icon { position: relative; width: 32px; height: 32px; margin-right: 12px; }
        .layer-icon div { position: absolute; width: 28px; height: 12px; border-radius: 2px; transform: rotate(-15deg) skewX(30deg); }
        .layer-top { background: #93c5fd; top: 0; left: 4px; z-index: 3; box-shadow: -2px 2px 4px rgba(0,0,0,0.3); }
        .layer-mid { background: #3b82f6; top: 8px; left: 2px; z-index: 2; box-shadow: -2px 2px 4px rgba(0,0,0,0.3); }
        .layer-bot { background: #1d4ed8; top: 16px; left: 0; z-index: 1; box-shadow: -2px 2px 4px rgba(0,0,0,0.3); }
        .spin-slow { animation: spin 4s linear infinite; }
        .spin-reverse-slow { animation: spin-reverse 4s linear infinite; }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }
    </style>
</head>
<body>

<div id="app-wrapper" class="text-gray-200">

    <nav class="border-b border-borderColor px-6 py-4 flex justify-between items-center bg-appBg shrink-0">
        <div class="flex items-center">
            <div class="layer-icon">
                <div class="layer-top"></div><div class="layer-mid"></div><div class="layer-bot"></div>
            </div>
            <div class="leading-tight mt-1">
                <h1 class="text-[22px] font-bold text-white tracking-wide">MarrScraper</h1>
                <p class="text-[13px] text-gray-400">Enterprise Edition</p>
            </div>
        </div>
        <div id="systemBadge" class="bg-[#1e222a] border border-borderColor text-gray-300 text-[13px] px-3 py-1.5 rounded-md flex items-center gap-2">
            <span id="statusText">Sistem Siap</span> 
            <div id="statusDot" class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_5px_#22c55e]"></div>
        </div>
    </nav>

    <main class="flex-grow p-5 grid grid-cols-12 gap-5 w-full h-full overflow-hidden">
        
        <div class="col-span-4 bg-panelBg rounded-xl p-5 border border-borderColor h-full shadow-xl flex flex-col">
            <h2 class="text-lg font-bold text-white mb-5 flex items-center shrink-0">
                <div class="relative flex items-center justify-center w-11 h-11 rounded-lg bg-gradient-to-br from-[#1e222a] to-[#12151c] border border-borderColor shadow-inner mr-4 overflow-hidden group">
                    <i class="fas fa-cog text-gray-400 absolute text-[22px] -ml-3 -mt-3 group-hover:spin-slow transition-transform"></i>
                    <i class="fas fa-cog text-blue-500 absolute text-[14px] ml-3 mt-3 group-hover:spin-reverse-slow transition-transform"></i>
                </div>
                Parameter Ekstraksi
            </h2>
            
            <form id="scraperForm" class="space-y-4 flex-grow flex flex-col">
                <div>
                    <label class="block text-[13px] font-medium text-gray-200 mb-1.5">Kata Kunci Pencarian</label>
                    <textarea id="keyword" required rows="2" class="w-full bg-inputBg border border-borderColor rounded-md p-3 text-white focus:border-blue-500 outline-none transition resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-[13px] font-medium text-gray-200 mb-1.5">Area / Lokasi Target</label>
                    <input type="text" id="location" required class="w-full bg-inputBg border border-borderColor rounded-md p-3 text-white focus:border-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-[13px] font-medium text-gray-200 mb-1.5 flex justify-between">
                        <span>Jumlah Data</span>
                        <span class="text-[10px] text-gray-400 bg-[#12151c] px-2 py-0.5 rounded border border-borderColor">Maks: 999</span>
                    </label>
                    <input type="number" id="dataLimit" required min="1" max="999" value="10" class="w-full bg-inputBg border border-borderColor rounded-md p-3 text-white focus:border-blue-500 outline-none transition font-mono text-center text-lg tracking-wider">
                    <div class="flex justify-between items-center mt-2 text-[11px] font-medium px-1">
                        <span class="text-green-400 font-bold"><i class="fas fa-check text-[10px] mr-1"></i>1-50 (Gratis)</span>
                        <span class="text-yellow-500 font-bold"><i class="fas fa-lock text-[10px] mr-1"></i>51-999 (Berbayar)</span>
                    </div>
                </div>
                <div class="flex-grow">
                    <label class="block text-[13px] font-medium text-gray-200 mb-2 mt-1">Pilih Entitas Data</label>
                    <div class="grid grid-cols-2 gap-y-3 gap-x-2">
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="fields" value="name" checked class="w-4 h-4 bg-inputBg border-borderColor rounded focus:ring-0"><span class="text-[13px] text-gray-300">🏪 Nama</span></label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="fields" value="phone" checked class="w-4 h-4 bg-inputBg border-borderColor rounded focus:ring-0"><span class="text-[13px] text-gray-300">💬 No. WA</span></label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="fields" value="email" checked class="w-4 h-4 bg-inputBg border-borderColor rounded focus:ring-0"><span class="text-[13px] text-gray-300">✉️ Email</span></label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="fields" value="review" checked class="w-4 h-4 bg-inputBg border-borderColor rounded focus:ring-0"><span class="text-[13px] text-gray-300">⭐ Review</span></label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="fields" value="link" checked class="w-4 h-4 bg-inputBg border-borderColor rounded focus:ring-0"><span class="text-[13px] text-gray-300">🔗 Link Maps</span></label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="fields" value="address" checked class="w-4 h-4 bg-inputBg border-borderColor rounded focus:ring-0"><span class="text-[13px] text-gray-300">📍 Alamat</span></label>
                    </div>
                </div>
                <button type="submit" id="btnRun" class="w-full bg-brandBlue hover:bg-blue-600 text-white font-medium py-3 rounded-md transition-colors flex justify-center items-center gap-2 shadow-lg shadow-blue-500/20 shrink-0">
                    <i class="fas fa-play text-sm"></i> Mulai Ekstraksi
                </button>
            </form>
        </div>

        <div class="col-span-8 bg-panelBg rounded-xl border border-borderColor shadow-xl flex flex-col h-full overflow-hidden">
            <div class="border-b border-borderColor flex items-end bg-[#1e222a] pt-3 px-2 z-10 shrink-0">
                <button id="tabData" class="px-6 py-3 border-b-2 border-blue-500 text-blue-400 font-bold text-[13px] transition-colors flex items-center gap-2"><i class="fas fa-table"></i> Data Hasil</button>
                <button id="tabHistory" class="px-6 py-3 border-b-2 border-transparent text-gray-400 hover:text-gray-200 font-semibold text-[13px] transition-colors flex items-center gap-2"><i class="fas fa-history"></i> Riwayat Tugas</button>
                <div class="ml-auto pb-2 pr-4 flex gap-2">
                    <button onclick="loadHistory(true)" id="btnRefreshHistory" class="hidden bg-transparent hover:bg-white/5 border border-borderColor text-gray-300 px-3 py-1.5 rounded-md text-[12px] transition items-center gap-2"><i class="fas fa-sync-alt"></i> Refresh</button>
                    <button onclick="downloadCSV()" id="btnExport" class="bg-transparent hover:bg-white/5 border border-borderColor text-gray-300 px-3 py-1.5 rounded-md text-[12px] font-medium transition flex items-center gap-2"><i class="fas fa-download"></i> Export CSV</button>
                </div>
            </div>

            <div id="dataContainer" class="overflow-auto flex-grow bg-panelBg relative">
                <table class="w-full text-left border-collapse min-w-[700px] border-hidden">
                    <thead class="bg-panelBg sticky top-0 z-10">
                        <tr class="text-white text-[13px] font-bold" id="tableHead"></tr>
                    </thead>
                    <tbody id="tableBody" class="text-[13px] text-gray-300">
                        <tr><td colspan="6" class="p-16 text-center text-gray-500 border border-borderColor border-l-0 border-r-0"><i class="fas fa-inbox text-4xl mb-3 block opacity-50"></i>Belum ada data.</td></tr>
                    </tbody>
                </table>
            </div>

            <div id="historyContainer" class="hidden overflow-auto flex-grow bg-panelBg relative">
                <table class="w-full text-left border-collapse border-hidden">
                    <thead class="bg-panelBg sticky top-0 z-10">
                        <tr class="text-white text-[13px] font-bold">
                            <th class="border border-borderColor border-l-0 border-t-0 px-4 py-3">Tanggal Mulai</th>
                            <th class="border border-borderColor border-t-0 px-4 py-3">ID Task Apify</th>
                            <th class="border border-borderColor border-t-0 px-4 py-3">Status</th>
                            <th class="border border-borderColor border-r-0 border-t-0 px-4 py-3">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody" class="text-[13px] text-gray-300"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    // KONEKSI KE BACKEND NODE.JS LOCALHOST
    const BACKEND_URL = 'http://localhost:3000/api';
    let currentData = [];
    const labels = { name: 'Nama Usaha', phone: 'No. WhatsApp', email: 'Email', review: 'Rating/Review', link: 'Tautan Peta', address: 'Alamat' };

    const tabData = document.getElementById('tabData');
    const tabHistory = document.getElementById('tabHistory');
    const dataContainer = document.getElementById('dataContainer');
    const historyContainer = document.getElementById('historyContainer');
    const btnExport = document.getElementById('btnExport');
    const btnRefreshHistory = document.getElementById('btnRefreshHistory');
    const historyBody = document.getElementById('historyBody');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    const tbody = document.getElementById('tableBody');
    const thead = document.getElementById('tableHead');
    const btnRun = document.getElementById('btnRun');

    // TAB LOGIC
    tabData.addEventListener('click', () => {
        tabData.className = "px-6 py-3 border-b-2 border-blue-500 text-blue-400 font-bold text-[13px] transition-colors flex items-center gap-2";
        tabHistory.className = "px-6 py-3 border-b-2 border-transparent text-gray-400 hover:text-gray-200 font-semibold text-[13px] transition-colors flex items-center gap-2";
        dataContainer.classList.remove('hidden'); historyContainer.classList.add('hidden');
        btnExport.classList.remove('hidden'); btnRefreshHistory.classList.add('hidden');
    });

    tabHistory.addEventListener('click', () => {
        tabHistory.className = "px-6 py-3 border-b-2 border-blue-500 text-blue-400 font-bold text-[13px] transition-colors flex items-center gap-2";
        tabData.className = "px-6 py-3 border-b-2 border-transparent text-gray-400 hover:text-gray-200 font-semibold text-[13px] transition-colors flex items-center gap-2";
        historyContainer.classList.remove('hidden'); dataContainer.classList.add('hidden');
        btnExport.classList.add('hidden'); btnRefreshHistory.classList.remove('hidden'); btnRefreshHistory.classList.add('flex');
        loadHistory();
    });

    function setStatus(state) {
        if (state === 'running') {
            statusText.innerText = "Sistem Bekerja..."; statusDot.className = "w-2 h-2 bg-yellow-400 rounded-full animate-ping";
            btnRun.disabled = true; btnRun.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Mengekstrak...`;
        } else if (state === 'success') {
            statusText.innerText = "Sistem Siap"; statusDot.className = "w-2 h-2 bg-green-500 rounded-full shadow-[0_0_5px_#22c55e]";
            btnRun.disabled = false; btnRun.innerHTML = `<i class="fas fa-play"></i> Mulai Ekstraksi`;
        } else if (state === 'error') {
            statusText.innerText = "Koneksi Gagal"; statusDot.className = "w-2 h-2 bg-red-500 rounded-full shadow-[0_0_5px_#ef4444]";
            btnRun.disabled = false; btnRun.innerHTML = `<i class="fas fa-play"></i> Coba Lagi`;
        } else if (state === 'blocked') {
            statusText.innerText = "Akses Premium"; statusDot.className = "w-2 h-2 bg-yellow-500 rounded-full shadow-[0_0_5px_#eab308]";
            btnRun.disabled = false; btnRun.innerHTML = `<i class="fas fa-play"></i> Mulai Ekstraksi`;
        }
    }

    // KOMUNIKASI DENGAN NODE.JS
    async function apiCall(endpoint, payload = null) {
        const options = { method: 'POST', headers: { 'Content-Type': 'application/json' } };
        if (payload) options.body = JSON.stringify(payload);
        const res = await fetch(`${BACKEND_URL}/${endpoint}`, options);
        return await res.json();
    }

    document.getElementById('scraperForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        tabData.click();
        const keyword = document.getElementById('keyword').value;
        const location = document.getElementById('location').value;
        const dataLimit = parseInt(document.getElementById('dataLimit').value);
        const fields = Array.from(document.querySelectorAll('input[name="fields"]:checked')).map(cb => cb.value);

        if(fields.length === 0) return alert("Pilih minimal satu entitas!");
        updateHeader(fields);

        if (dataLimit > 50) {
            setStatus('blocked');
            tbody.innerHTML = `<tr><td colspan="${fields.length}" class="p-20 text-center border border-borderColor border-l-0 border-r-0 bg-[#1e222a]/50"><div class="flex flex-col items-center justify-center"><div class="w-16 h-16 bg-yellow-500/10 rounded-full flex items-center justify-center mb-4"><i class="fas fa-lock text-3xl text-yellow-500"></i></div><h3 class="text-xl font-bold text-white mb-2">Fitur Premium</h3><p class="text-gray-400 text-[13px] mb-4">Ekstraksi >50 data memerlukan paket berbayar.</p><button class="bg-yellow-500 text-black font-bold py-2 px-6 rounded-md"><i class="fas fa-crown mr-2"></i>Upgrade Sekarang</button></div></td></tr>`;
            return; 
        }

        setStatus('running');
        tbody.innerHTML = `<tr><td colspan="${fields.length}" class="p-20 text-center border border-borderColor border-l-0 border-r-0"><div class="w-10 h-10 border-4 border-borderColor border-t-blue-500 rounded-full animate-spin mx-auto mb-4"></div><div id="loadingText" class="text-blue-400 font-medium">Memulai Scraper...</div></td></tr>`;

        try {
            const startRes = await apiCall('start', { keyword, location, dataLimit });
            if (startRes.status !== 'success') throw new Error(startRes.message);

            let isFinished = false;
            while (!isFinished) {
                document.getElementById('loadingText').innerHTML = `Sedang mengekstrak data dari Apify...<br><span class="text-gray-500 text-[11px] block mt-2">Pengecekan otomatis. Harap tunggu.</span>`;
                await new Promise(resolve => setTimeout(resolve, 5000));
                
                const checkRes = await apiCall('check', { runId: startRes.runId });
                if (checkRes.runStatus === 'SUCCEEDED') isFinished = true;
                else if (checkRes.runStatus === 'FAILED' || checkRes.runStatus === 'ABORTED') throw new Error(`Proses dihentikan server.`);
            }

            document.getElementById('loadingText').innerText = "Data siap! Mengunduh...";
            const dataRes = await apiCall('dataset', { datasetId: startRes.datasetId });
            
            if (dataRes.status === 'success') {
                currentData = formatData(dataRes.data);
                if(currentData.length > 0) renderTable(currentData, fields);
                else tbody.innerHTML = `<tr><td colspan="${fields.length}" class="p-10 text-center text-gray-500 border border-borderColor border-l-0 border-r-0">Tidak ada data ditemukan.</td></tr>`;
                setStatus('success');
            } else throw new Error(dataRes.message);

        } catch (error) {
            tbody.innerHTML = `<tr><td colspan="${fields.length}" class="p-10 text-center border border-borderColor border-l-0 border-r-0"><div class="text-red-400 font-bold mb-2">KONEKSI GAGAL</div><div class="text-gray-400 text-xs">Pastikan Server Termux (Node.js) sedang berjalan. ${error.message}</div></td></tr>`;
            setStatus('error');
        }
    });

    async function loadHistory(isRefresh = false) {
        if(isRefresh) btnRefreshHistory.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Refreshing...`;
        else historyBody.innerHTML = `<tr><td colspan="4" class="p-10 text-center border border-borderColor border-l-0 border-r-0"><i class="fas fa-circle-notch fa-spin text-blue-500 text-2xl mb-2 block"></i>Memuat riwayat server...</td></tr>`;

        try {
            const res = await apiCall('history');
            const runs = res.items;

            if(runs.length === 0) { historyBody.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-white">Belum ada riwayat.</td></tr>`; return; }

            historyBody.innerHTML = runs.map(run => {
                const dateObj = new Date(run.startedAt);
                const dateStr = dateObj.toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'}) + ' ' + dateObj.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
                
                let statusBadge = "", actionBtn = "-";
                if (run.status === 'SUCCEEDED') {
                    statusBadge = `<span class="text-green-400 px-2 font-bold"><i class="fas fa-check-circle mr-1"></i> SELESAI</span>`;
                    actionBtn = `<button onclick="fetchPastData('${run.defaultDatasetId}')" class="bg-brandBlue text-white px-3 py-1 rounded shadow text-[11px] font-bold">Lihat Data</button>`;
                } else if (run.status === 'RUNNING') {
                    statusBadge = `<span class="text-yellow-400 px-2 font-bold animate-pulse"><i class="fas fa-cog fa-spin mr-1"></i> BERJALAN</span>`;
                } else {
                    statusBadge = `<span class="text-red-400 px-2 font-bold"><i class="fas fa-times-circle mr-1"></i> ${run.status}</span>`;
                }
                return `<tr class="hover:bg-white/5 border-b border-borderColor">
                            <td class="px-4 py-3 text-white border-r border-borderColor">${dateStr}</td>
                            <td class="px-4 py-3 font-mono text-gray-400 text-[11px] border-r border-borderColor">${run.id}</td>
                            <td class="px-4 py-3 border-r border-borderColor">${statusBadge}</td>
                            <td class="px-4 py-3">${actionBtn}</td>
                        </tr>`;
            }).join('');
        } catch (err) {
            historyBody.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-red-400">Gagal memuat riwayat.</td></tr>`;
        } finally {
            if(isRefresh) btnRefreshHistory.innerHTML = `<i class="fas fa-sync-alt"></i> Refresh`;
        }
    }

    async function fetchPastData(datasetId) {
        tabData.click();
        const fields = Array.from(document.querySelectorAll('input[name="fields"]:checked')).map(cb => cb.value);
        if(fields.length === 0) return alert("Pilih entitas data!");
        updateHeader(fields);

        tbody.innerHTML = `<tr><td colspan="${fields.length}" class="p-16 text-center border border-borderColor border-l-0 border-r-0"><div class="w-8 h-8 border-4 border-t-blue-500 rounded-full animate-spin mx-auto mb-3"></div><div class="text-blue-400 font-medium">Memuat dataset...</div></td></tr>`;

        try {
            const res = await apiCall('dataset', { datasetId: datasetId });
            if (res.status === 'success') {
                currentData = formatData(res.data);
                if(currentData.length > 0) renderTable(currentData, fields);
                else tbody.innerHTML = `<tr><td colspan="${fields.length}" class="p-10 text-center text-gray-500 border border-borderColor border-l-0 border-r-0">Dataset kosong.</td></tr>`;
                setStatus('success');
            } else throw new Error(res.message);
        } catch (e) {
            tbody.innerHTML = `<tr><td colspan="${fields.length}" class="p-10 text-center text-red-500">Error dataset: ${e.message}</td></tr>`;
            setStatus('error');
        }
    }

    function formatData(rawData) {
        return rawData.map(item => ({
            name: item.title || '-', phone: item.phone || item.phoneUnformatted || '-',
            email: item.email || (item.emails && item.emails[0]) || 'kontak@toko.com',
            review: item.totalScore ? `${item.totalScore}/5 stars` : '4.5/5 stars',
            link: item.url || '-', address: item.address || item.street || '-'
        }));
    }

    function updateHeader(fields) {
        thead.innerHTML = fields.map((f, i) => `<th class="px-4 py-3 border-borderColor ${i!==0?'border-l':''} ${i!==fields.length-1?'border-r':''}">${labels[f]}</th>`).join('');
    }

    function renderTable(data, fields) {
        tbody.innerHTML = data.map(item => `
            <tr class="hover:bg-white/5 border-b border-borderColor">
                ${fields.map((f, i) => {
                    let val = item[f] || '-';
                    let tdCls = `px-4 py-3 align-middle text-white border-borderColor ${i!==0?'border-l':''} ${i!==fields.length-1?'border-r':''}`;
                    if (f === 'phone') return `<td class="${tdCls} whitespace-nowrap"><i class="fab fa-whatsapp text-green-500 mr-1"></i>${val}</td>`;
                    if (f === 'review') return `<td class="${tdCls} whitespace-nowrap"><i class="fas fa-star text-yellow-500 mr-1"></i>${val}</td>`;
                    if (f === 'link') return `<td class="${tdCls} whitespace-nowrap"><a href="${val}" target="_blank" class="text-blue-500 hover:underline">Buka Peta</a></td>`;
                    return `<td class="${tdCls}">${val}</td>`;
                }).join('')}
            </tr>`).join('');
    }

    function downloadCSV() {
        if (currentData.length === 0) return alert('Data kosong!');
        const fields = Array.from(document.querySelectorAll('input[name="fields"]:checked')).map(cb => cb.value);
        let csv = fields.map(f => labels[f]).join(",") + "\n";
        currentData.forEach(row => { csv += fields.map(f => `"${String(row[f] || "").replace(/"/g, '""')}"`).join(",") + "\n"; });
        const link = document.createElement("a"); link.href = encodeURI("data:text/csv;charset=utf-8," + csv);
        link.download = `MarrScraper_Termux_${new Date().getTime()}.csv`; link.click();
    }
</script>

</body>
</html>
